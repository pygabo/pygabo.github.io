    <!-- ## subheading -->
    <text x="130" y="185" fill="#7ee787" font-weight="600" font-size="17">## Mi Mentalidad</text>

    <text x="130" y="215" fill="#e6edf3">Pensamiento critico y metodo cientifico son la arquitectura.</text>

    <text x="130" y="245" fill="#e6edf3">- <tspan fill="#ff7b72">**Agnosticismo y Logica:**</tspan> Valoro lo que se puede probar y razonar.</text>
    <text x="130" y="275" fill="#e6edf3">- <tspan fill="#ff7b72">**El "Por que" sobre el "Que":**</tspan> Busqueda de la verdad tecnica.</text>

    <text x="130" y="305" fill="#484f58">---</text>

    <text x="130" y="335" fill="#7ee787" font-weight="600" font-size="17">## API de Comunicacion</text>

    <text x="130" y="365" fill="#e6edf3">- <tspan fill="#ff7b72">**Sin Small Talk:**</tspan> Ve directo al grano.</text>
    <text x="130" y="395" fill="#e6edf3">- <tspan fill="#ff7b72">**Contexto Asincrono:**</tspan> Mensaje antes de reunion.</text>
    <text x="130" y="425" fill="#e6edf3">- <tspan fill="#ff7b72">**Directo y Crudo:**</tspan> Estandar de calidad, no algo personal.</text>

    <text x="130" y="455" fill="#484f58">---</text>

    <text x="130" y="485" fill="#7ee787" font-weight="600" font-size="17">## Bugs Conocidos</text>
